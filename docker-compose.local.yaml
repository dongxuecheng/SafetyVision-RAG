# Docker Compose配置 - 本地完整部署模式
# 所有模型都使用本地vLLM服务部署
# 使用命令: docker compose -f docker-compose.local.yaml up -d

networks:
  ai-network:
    driver: bridge

services:
  # (服务 1) Qwen-VL 多模态大模型 - 用于图像分析和文本QA
  vllm-qwen-vl:
    image: vllm/vllm-openai:nightly
    container_name: vllm-qwen-vl
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/xcd/vllm/model:/model:ro
    ports:
      - "28000:8000"
    command:
      - --model
      - /model/qwen3-vl-4b
      - --gpu-memory-utilization
      - "0.7"
      - --max-model-len
      - "8192"
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # (服务 2) BGE-M3 Embedding 模型
  vllm-bge-m3:
    image: vllm/vllm-openai:nightly
    container_name: vllm-bge-m3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/xcd/vllm/model:/model:ro
    ports:
      - "28001:8000"
    command:
      - --model
      - /model/bge-m3
      - --gpu-memory-utilization
      - "0.2"
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # (服务 3) BGE-Reranker-v2-M3 重排序模型
  vllm-bge-reranker:
    image: vllm/vllm-openai:nightly
    container_name: vllm-bge-reranker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [gpu]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/xcd/vllm/model:/model:ro
    ports:
      - "28002:8000"
    command:
      - --model
      - /model/bge-reranker-v2-m3
      - --gpu-memory-utilization
      - "0.15"
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # (服务 4) Qdrant 向量数据库
  qdrant-server:
    image: qdrant/qdrant:latest
    container_name: qdrant-server
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - ai-network
    restart: unless-stopped

  # (服务 5) SafetyVision-RAG API (LangChain + FastAPI)
  safetyvision-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: safetyvision-rag:latest
    container_name: safetyvision-api
    ports:
      - "8080:8000"
    volumes:
      - ./app:/app/app:ro
      - ./file:/app/file:rw
      - ./logs:/app/logs:rw  # 日志目录
    environment:
      # Deployment mode
      DEPLOYMENT_MODE: ${DEPLOYMENT_MODE}
      
      # Qdrant
      QDRANT_HOST: ${QDRANT_HOST}
      QDRANT_PORT: ${QDRANT_PORT}
      
      # Local vLLM Services
      VLLM_LLM_URL: ${VLLM_LLM_URL}
      VLLM_LLM_MODEL: ${VLLM_LLM_MODEL}
      VLLM_EMBED_URL: ${VLLM_EMBED_URL}
      VLLM_EMBED_MODEL: ${VLLM_EMBED_MODEL}
      VLLM_RERANK_URL: ${VLLM_RERANK_URL}
      VLLM_RERANK_MODEL: ${VLLM_RERANK_MODEL}
      
      # Logging
      LOG_LEVEL: ${LOG_LEVEL}
    networks:
      - ai-network
    depends_on:
      vllm-qwen-vl:
        condition: service_healthy
      vllm-bge-m3:
        condition: service_healthy
      vllm-bge-reranker:
        condition: service_healthy
      qdrant-server:
        condition: service_started
    restart: unless-stopped

  # (服务 6) Chainlit RAG QA Web UI
  chainlit-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: safetyvision-rag:latest
    container_name: chainlit-ui
    ports:
      - "25810:8000"
    volumes:
      - ./app:/app/app:ro
      - ./chainlit_app.py:/app/chainlit_app.py:ro
      - ./.chainlit:/app/.chainlit:rw
      - ./public:/app/public:ro
      - ./chainlit.md:/app/chainlit.md:ro
      - ./chainlit_zh-CN.md:/app/chainlit_zh-CN.md:ro
      - ./logs:/app/logs:rw  # 日志目录
    environment:
      # Deployment mode
      DEPLOYMENT_MODE: local
      
      # Qdrant
      QDRANT_HOST: qdrant-server
      QDRANT_PORT: 6333
      
      # Local vLLM Services
      VLLM_LLM_URL: http://vllm-qwen-vl:8000/v1
      VLLM_LLM_MODEL: /model/Qwen3-VL-4B
      VLLM_EMBED_URL: http://vllm-bge-m3:8000/v1
      VLLM_EMBED_MODEL: /model/bge-m3
      VLLM_RERANK_URL: http://vllm-bge-reranker:8000
      VLLM_RERANK_MODEL: /model/bge-reranker-v2-m3
      
      # Chainlit
      CHAINLIT_HOST: 0.0.0.0
      CHAINLIT_PORT: 8000
      
      # Logging
      LOG_LEVEL: INFO
    command: ["chainlit", "run", "chainlit_app.py", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - ai-network
    depends_on:
      - safetyvision-api
    restart: unless-stopped
