# Docker Compose for Aliyun API Version
# 本配置使用阿里云百炼API，只部署必要的服务（Embedding, Reranker, Qdrant）
# 使用命令: docker compose -f docker-compose.aliyun.yaml up -d

networks:
  ai-network:
    driver: bridge

services:
  # (服务 1) BGE-M3 Embedding 模型 (自托管)
  vllm-bge-m3:
    image: vllm/vllm-openai:nightly
    container_name: vllm-bge-m3
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/xcd/vllm/model:/model:ro
    ports:
      - "28001:8000"
    command:
      - --model
      - /model/bge-m3
      - --gpu-memory-utilization
      - "0.3"
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # (服务 2) Qdrant 向量数据库
  qdrant-server:
    image: qdrant/qdrant:latest
    container_name: qdrant-server
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - ./data/qdrant:/qdrant/storage
    networks:
      - ai-network
    restart: unless-stopped

  # (服务 3) BGE-Reranker-v2-M3 重排序模型 (自托管)
  vllm-bge-reranker:
    image: vllm/vllm-openai:nightly
    container_name: vllm-bge-reranker
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              capabilities: [ gpu ]
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - /home/xcd/vllm/model:/model:ro
    ports:
      - "28002:8000"
    command:
      - --model
      - /model/bge-reranker-v2-m3
      - --gpu-memory-utilization
      - "0.3"
    networks:
      - ai-network
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # (服务 4) SafetyVision RAG API (使用阿里云API)
  safetyvision-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: safetyvision-rag:latest
    container_name: safetyvision-api
    ports:
      - "8080:8000"
    volumes:
      - ./app:/app/app:ro
      - ./file:/app/file:rw
    environment:
      # Aliyun DashScope API
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      
      # Model Configuration
      VLM_MODEL_NAME: ${VLM_MODEL_NAME:-qwen3-vl-plus}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen3-max-preview}
      
      # Self-hosted Services
      QDRANT_HOST: qdrant-server
      VLLM_EMBED_URL: http://vllm-bge-m3:8000/v1
      VLLM_EMBED_MODEL: /model/bge-m3
      VLLM_RERANK_URL: http://vllm-bge-reranker:8000
      VLLM_RERANK_MODEL: /model/bge-reranker-v2-m3
    networks:
      - ai-network
    depends_on:
      vllm-bge-m3:
        condition: service_healthy
      vllm-bge-reranker:
        condition: service_healthy
      qdrant-server:
        condition: service_started
    restart: unless-stopped

  # (服务 5) Chainlit RAG QA Web UI (使用阿里云API)
  chainlit-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: safetyvision-rag:latest
    container_name: chainlit-ui
    ports:
      - "25810:8000"
    volumes:
      - ./app:/app/app:ro
      - ./chainlit_app.py:/app/chainlit_app.py:ro
      - ./.chainlit:/app/.chainlit:rw
      - ./public:/app/public:ro
      - ./chainlit.md:/app/chainlit.md:ro
      - ./chainlit_zh-CN.md:/app/chainlit_zh-CN.md:ro
    environment:
      # Aliyun DashScope API
      DASHSCOPE_API_KEY: ${DASHSCOPE_API_KEY}
      DASHSCOPE_BASE_URL: ${DASHSCOPE_BASE_URL:-https://dashscope.aliyuncs.com/compatible-mode/v1}
      
      # Model Configuration
      VLM_MODEL_NAME: ${VLM_MODEL_NAME:-qwen3-vl-plus}
      LLM_MODEL_NAME: ${LLM_MODEL_NAME:-qwen3-max-preview}
      
      # Self-hosted Services
      QDRANT_HOST: qdrant-server
      VLLM_EMBED_URL: http://vllm-bge-m3:8000/v1
      VLLM_EMBED_MODEL: /model/bge-m3
      VLLM_RERANK_URL: http://vllm-bge-reranker:8000
      VLLM_RERANK_MODEL: /model/bge-reranker-v2-m3
      
      CHAINLIT_HOST: 0.0.0.0
      CHAINLIT_PORT: 8000
    command: ["chainlit", "run", "chainlit_app.py", "--host", "0.0.0.0", "--port", "8000"]
    networks:
      - ai-network
    depends_on:
      - safetyvision-api
    restart: unless-stopped
